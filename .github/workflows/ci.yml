name: Python Testing CI

# Trigger this workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone your repository's code onto the GitHub virtual machine
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Install Python on the machine
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    # 3. Upgrade pip and install your required packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy scipy 

    # 4. Fire up pytest just like you do on your own laptop!
    - name: Run test suite with pytest
      run: |
        pytest
