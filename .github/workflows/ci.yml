name: Python Testing CI

# Trigger this workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone your repository's code onto the GitHub virtual machine
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Install Python on the machine
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Upgrade pip and install standard packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy scipy matplotlib

    # 4. Run pytest with explicit root workspace directory binding
    - name: Run test suite with pytest
      run: |
        python -m pytest -o pythonpath=.
